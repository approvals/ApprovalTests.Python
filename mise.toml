[tasks]
install = "python -m pip install -r requirements.dev.txt --quiet"
test = "python -m pytest --quiet"
mypy = "python -m mypy . --quiet"
integration_tests = "python test__mypy_accepts_our_packages.py --quiet"

[env]
_.python.venv = { path = ".venv", create = true, uv_create_args = ['--seed', '--quiet'] }

[settings]
jobs = 1  # to ensure that `mise run install ::: foo` installs dependencies before running foo
quiet = true